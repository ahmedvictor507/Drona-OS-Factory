name: Build Drona Master OS

on:
  workflow_dispatch:

jobs:
  build-os:
    runs-on: ubuntu-22.04
    
    steps:
      - name: 📥 Download Factory Code
        uses: actions/checkout@v4

      - name: 🧠 Inject Drona Brain (ARM64 Emulator)
        id: build_image
        uses: pguyot/arm-runner-action@v2
        with:
          # 🌟 THE FIX: We are now downloading the 64-bit (arm64) version of Ubuntu!
          base_image: https://cdimage.ubuntu.com/releases/20.04/release/ubuntu-20.04.5-preinstalled-server-arm64+raspi.img.xz
          image_additional_mb: 1024
          commands: |
            chmod +x build.sh
            bash ./build.sh

      - name: 🗜️ Compress the Final Image
        run: |
          zip drona-master-image.zip ${{ steps.build_image.outputs.image }}

      - name: 🚀 Publish the Final OS
        uses: actions/upload-artifact@v4
        with:
          name: Drona-OS-Master
          path: drona-master-image.zip
