name: Build Drona Master OS

on:
  workflow_dispatch:

jobs:
  build-os:
    runs-on: ubuntu-22.04
    
    steps:
      - name: 📥 Download Factory Code
        uses: actions/checkout@v4

      - name: 🧠 Inject Drona Brain (ARM Emulator)
        id: build_image
        # This action is specifically built for Raspberry Pi images!
        uses: pguyot/arm-runner-action@v2
        with:
          # It downloads and unzips the base OS for us automatically
          base_image: https://cdimage.ubuntu.com/releases/20.04/release/ubuntu-20.04.5-preinstalled-server-armhf+raspi.img.xz
          # It adds 1GB of extra free space to the SD card image so we have room for our code
          image_additional_mb: 1024
          commands: |
            chmod +x build.sh
            bash ./build.sh

      - name: 🗜️ Compress the Final Image
        run: |
          # The action hands us the exact file name of the finished image
          zip drona-master-image.zip ${{ steps.build_image.outputs.image }}

      - name: 🚀 Publish the Final OS
        uses: actions/upload-artifact@v4
        with:
          name: Drona-OS-Master
          path: drona-master-image.zip
